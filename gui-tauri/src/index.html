<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinTune</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <nav id="sidebar">
            <div class="sidebar-header">
                <div class="logo">⚡</div>
                <div class="brand">
                    <span class="brand-name">WinTune</span>
                    <span class="brand-version">v0.3</span>
                </div>
            </div>
            <div class="nav-items">
                <button class="nav-btn active" data-view="dashboard">
                    <span class="nav-icon">▦</span>
                    Dashboard
                </button>
                <button class="nav-btn" data-view="profiles">
                    <span class="nav-icon">▤</span>
                    Profiles
                </button>
                <button class="nav-btn" data-view="audit">
                    <span class="nav-icon">◎</span>
                    Audit
                </button>
                <button class="nav-btn" data-view="apply">
                    <span class="nav-icon">⚙</span>
                    Apply
                </button>
                <button class="nav-btn" data-view="revert">
                    <span class="nav-icon">↩</span>
                    History
                </button>
            </div>
            <div class="sidebar-footer">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Ready</span>
            </div>
        </nav>

        <main id="content">
            <section id="view-dashboard" class="view active"></section>
            <section id="view-profiles" class="view"></section>
            <section id="view-audit" class="view"></section>
            <section id="view-apply" class="view"></section>
            <section id="view-revert" class="view"></section>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/profiles.js"></script>
    <script src="js/audit.js"></script>
    <script src="js/apply.js"></script>
    <script src="js/revert.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
